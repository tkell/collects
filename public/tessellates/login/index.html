<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="/main.css">
    <script src="/api-state.js"></script>
    <script src="/login.js"></script>
    <script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark-mode') {
            document.documentElement.setAttribute('data-theme', 'dark-mode');
        } else {
            document.documentElement.setAttribute('data-theme', 'light-mode');
        }
    })();
  </script>

  </head>
  <body>
    <div class="centre" id="text">tessellates</div>

    <div class="centre" id="hexagons-container">
    </div>
    <div class="centre" id="collections-container" style="display: none;">
      <div>collections:</div>
      <ul id="collections-list">
      </ul>
      <div class="centre" id="new-collection-container">
        <div>new collection:</div>
        <input type="text" id="new-collection-name" size="16" placeholder="collection name">
        <select id="new-collection-source">
          <option value="json_file">json file upload</option>
        </select>
        <input type="file" id="new-collection-file" accept=".json" style="display: none;">
        <button type="button" id="new-collection-submit">&#x1F333;</button>
      </div>
    </div>

    <div class="centre" id="login-fields">login:
      <input type="text" id="login-input" name="login" size="16" placeholder="email">
      |
      <input type="password" id="password-input" name="password" size="16" placeholder="password">
      <button type="button" id="login-submit">&#x1f6aa;</button>
    </div>

    <div class="centre" id="reset-password-container" style="display: none;">
      <div>set new password:</div>
      <input type="password" id="reset-new-password" size="16" placeholder="new password">
      <input type="password" id="reset-new-password-confirm" size="16" placeholder="confirm password">
      <button type="button" id="reset-password-submit">&#x1F511;</button>
    </div>

    <div class="centre" id="create-user-container">
      <div>create account:</div>
      <input type="text" id="create-username" name="username" size="16" placeholder="username">
      <input type="text" id="create-email" name="email" size="16" placeholder="email">
      <input type="password" id="create-password" name="password" size="16" placeholder="password">
      <input type="password" id="create-password-confirm" name="password_confirmation" size="16" placeholder="confirm password">
      <button type="button" id="create-user-submit">&#x1F680;</button>
    </div>

    <div class="centre" id="forgot-password-container">
      <div>forgot password:</div>
      <input type="text" id="forgot-password-email" size="16" placeholder="email">
      <button type="button" id="forgot-password-submit">&#x1F511;</button>
    </div>

    <div class="centre" id="settings-toggle-container">
        settings + states <button type="button" id="settings-toggle">&#x2314;</button>
    </div>
    <div id="settings-container" class="transition-fades is-hidden">
      <div class="centre" id="dark-mode-container">
        dark mode: <button type="button" id="dark-mode-button">&#x1F4A1;</button>
      </div>

      <div class="centre" id="logout-fields">
        logout: <button type="button" id="logout-button">&#128075;</button>
      </div>

      <div class="centre" id="update-user-container">
        <div>update account:</div>
        <input type="text" id="update-username" name="username" size="16" placeholder="new username">
        <input type="password" id="update-password" name="password" size="16" placeholder="new password">
        <input type="password" id="update-password-confirm" name="password_confirmation" size="16" placeholder="confirm password">
        <button type="button" id="update-user-submit">&#x1F4DD;</button>
      </div>

      <div class="centre" id="delete-collection-container">
        <div>delete collection:</div>
        <input type="text" id="delete-collection-name" name="collection_name" size="15" placeholder="collection name">
        <button type="button" id="delete-collection-submit">&#x1F5D1;</button>
      </div>

      <div class="centre" id="delete-user-container">
        <div>delete user:</div>
        <button type="button" id="delete-user-submit">&#x26A0;&#xFE0F; &#x2622;&#xFE0F; &#x26A0;&#xFE0F;</button>
      </div>
    </div>
  </body>
</html>
